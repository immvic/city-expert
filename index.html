<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>City ActivityAdvisor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-theme="dark">
    <div class="app landing">
      <section class="hero">
        <div class="hero-content">
          <p class="hero-kicker">City ActivityAdvisor</p>
          <h1>Plan a great day out without guessing the weather.</h1>
          <p class="hero-subtitle">
            Drop a city, an activity, and a date. We’ll blend live weather, nearby places, and a quick
            advisor summary into one clean plan.
          </p>
          <div class="hero-actions">
            <a class="primary hero-cta" href="/planning">Start planning</a>
            <span class="hero-note">Fast, local, no fuss.</span>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
